<!DOCTYPE HTML>
<html>
<head>
  
</head>
  
<body>
  
<div style="position:relative; width: 1600px; height: 1200px;">
  
<canvas id ="gridCanvas" width="1600" height="1200" style="position:absolute; left:0; top:0;">
Your browser does not support the HTML canvas tag.
</canvas>  
  
<canvas id="drawCanvas" width="1600" height="1200" style="position:absolute; left:0; top:0; border:1px solid #000000;">
Your browser does not support the HTML canvas tag.
</canvas>

</div>

<button id="drawButton">DRAW</button>
<button id="eraseButton">ERASE</button>

<label>Brush Color:
<input type="color" id ="colorPicker" value="#000000">
</label>

<label>Brush Size:
<input type="range" id="brushSlider" min="1" max="10" value="1">
</label>

<button id="clearButton">CLEAR</button>

<script src="script.js"></script>

</body>
</html>
